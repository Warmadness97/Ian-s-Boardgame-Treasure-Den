<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桌遊資料庫</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=12">
</head>
<body>

<div class="wrap">
  <div class="hero" id="banner">
    <img id="banner-img" class="hero-bg" style="display:none;" alt="">
    <div class="hero-overlay"></div>

    <div class="hero-content">
      <div class="header">
        <div class="title-box">
          <input id="site-title" value="桌遊資料庫" readonly />
          <svg class="edit-pencil owner-only" id="title-pencil" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </div>
        <div class="auth-box" id="auth-box">
          <button class="btn-login" id="login-btn">
            <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#FFF" d="M21.35 11.1h-9.17v2.94h5.26c-.23 1.5-1.7 4.4-5.26 4.4-3.17 0-5.75-2.62-5.75-5.85s2.58-5.85 5.75-5.85c1.8 0 3.01.77 3.7 1.43l2.52-2.43C16.96 3.9 14.87 3 12.18 3 6.98 3 2.78 7.2 2.78 12.4s4.2 9.4 9.4 9.4c5.42 0 9.02-3.81 9.02-9.18 0-.62-.07-1.09-.15-1.52z"/></svg>
            使用 Google 登入
          </button>
          <div class="user-chip" id="user-chip" style="display:none;">
            <img id="user-avatar" src="" alt="">
            <span id="user-name"></span>
            <button id="logout-btn" title="登出">登出</button>
          </div>
        </div>
      </div>
      <div class="custom-subtitle-box">
        <textarea id="custom-subtitle" placeholder="加一句副標語，例如：週末聚會桌遊收藏&#10;可以按 Enter 換行" rows="1" readonly></textarea>
        <svg class="edit-pencil owner-only" id="subtitle-pencil" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </div>
    </div>

    <button class="banner-upload-btn owner-only" id="banner-upload-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      上傳橫幅圖片
    </button>
    <button class="banner-remove-btn" id="banner-remove-btn" style="display:none;" title="移除橫幅圖片">✕</button>
    <input type="file" id="banner-file-input" accept="image/*" style="display:none;">
  </div>

  <div class="rule"></div>

  <div id="home-view">
    <div class="daily-pick-section" id="daily-pick-section"></div>

    <div class="recommend-section">
      <div class="section-title-row">
        <h2>推薦與精選</h2>
        <svg class="edit-pencil owner-only" id="recommend-pencil" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </div>
      <textarea id="recommend-content" class="recommend-textarea" rows="2" readonly placeholder="在這裡寫點推薦內容——最近喜歡的桌遊、聚會心得，或想跟大家分享的事&#10;可以按 Enter 換行"></textarea>
    </div>

    <button class="btn-enter-library" id="enter-library-btn">
      進入遊戲庫
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </button>

    <div class="genre-legend-section">
      <h2>桌遊類型介紹</h2>
      <div class="genre-legend-list" id="genre-legend-list"></div>
    </div>
  </div>

  <div id="library-view" style="display:none;">
  <div class="toolbar">
    <button class="btn-back-home" id="back-home-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M11 17l-5-5 5-5M18 12H7"/></svg>
      回首頁
    </button>
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search-input" type="text" placeholder="搜尋名稱、別名、類型、語言版本或系列…" />
    </div>
    <select id="sort-select" class="sort-select">
      <option value="newest">上傳時間（新到舊）</option>
      <option value="name">依名稱排序（A→Z）</option>
      <option value="year-desc">發行年份（新到舊）</option>
      <option value="year-asc">發行年份（舊到新）</option>
      <option value="lang">依語言版本排序（A→Z）</option>
    </select>
    <div class="filter-dropdown">
      <button class="btn-filter" id="filter-toggle-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16l-6 8v6l-4 2v-8L4 4z"/></svg>
        篩選
        <span class="filter-badge" id="filter-badge" style="display:none;">0</span>
      </button>
      <div class="filter-panel" id="filter-panel">
        <div class="filter-panel-row">
          <label>遊玩人數（可複選）</label>
          <div class="checkbox-group" id="filter-players-group">
            <label class="checkbox-option"><input type="checkbox" value="1"> 1 人</label>
            <label class="checkbox-option"><input type="checkbox" value="2"> 2 人</label>
            <label class="checkbox-option"><input type="checkbox" value="3"> 3 人</label>
            <label class="checkbox-option"><input type="checkbox" value="4"> 4 人</label>
            <label class="checkbox-option"><input type="checkbox" value="5"> 5 人</label>
            <label class="checkbox-option"><input type="checkbox" value="6"> 6 人以上</label>
          </div>
        </div>
        <div class="filter-panel-row">
          <label>語言版本（可複選）</label>
          <div class="checkbox-group" id="filter-lang-group"></div>
        </div>
        <div class="filter-panel-row">
          <label>桌遊類型（可複選）</label>
          <div class="checkbox-group" id="filter-genre-group"></div>
        </div>
        <div class="filter-panel-row">
          <label>系列（可複選）</label>
          <div class="checkbox-group" id="filter-series-group"></div>
        </div>
        <div class="filter-panel-row">
          <label>發行年份（可複選）</label>
          <div class="checkbox-group" id="filter-year-group"></div>
        </div>
        <div class="filter-panel-row">
          <label>難度（可複選）</label>
          <div class="checkbox-group" id="filter-difficulty-group">
            <label class="checkbox-option"><input type="checkbox" value="1"> ★☆☆☆☆</label>
            <label class="checkbox-option"><input type="checkbox" value="2"> ★★☆☆☆</label>
            <label class="checkbox-option"><input type="checkbox" value="3"> ★★★☆☆</label>
            <label class="checkbox-option"><input type="checkbox" value="4"> ★★★★☆</label>
            <label class="checkbox-option"><input type="checkbox" value="5"> ★★★★★</label>
          </div>
        </div>
        <div class="filter-panel-row">
          <label>主遊戲／擴充（可複選）</label>
          <div class="checkbox-group" id="filter-type-group">
            <label class="checkbox-option"><input type="checkbox" value="base"> 主遊戲</label>
            <label class="checkbox-option"><input type="checkbox" value="expansion"> 擴充</label>
          </div>
        </div>
      </div>
    </div>
    <button class="btn-clear-filters" id="reset-filters-btn" style="display:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      清除篩選
    </button>
  </div>

  <div class="toolbar">
    <button class="btn-add owner-only" id="open-add-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>
      新增桌遊
    </button>
    <div class="list-dropdown">
      <button class="btn-download" id="list-toggle-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 7V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2"/><path d="M12 3v13m0 0-3.5-3.5M12 16l3.5-3.5"/></svg>
        清單管理
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <div class="list-panel" id="list-panel">
        <button class="list-menu-item owner-only" id="import-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 21V9m0 0-4 4m4-4 4 4M4 7V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/></svg>
          匯入清單（CSV）
        </button>
        <input type="file" id="import-file-input" accept=".csv" style="display:none;">
        <button class="list-menu-item" id="download-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 3v12m0 0-4-4m4 4 4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
          下載清單（CSV）
        </button>
        <button class="list-menu-item owner-only" id="image-manager-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
          批次圖片管理
        </button>
      </div>
    </div>
    <select id="page-size-select" class="sort-select">
      <option value="20">每頁 20 筆</option>
      <option value="40">每頁 40 筆</option>
      <option value="60">每頁 60 筆</option>
    </select>
  </div>

  <div class="results-count" id="results-count" style="display:none;"></div>
  <div id="loading" class="empty-state">載入中…</div>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty-state" style="display:none;"></div>
  <div class="pagination" id="pagination"></div>
  </div>

  <div class="page-footer" id="subtitle-text">任何人皆可瀏覽與搜尋，僅管理者登入後可新增、編輯、刪除桌遊與修改標題 · 目前收錄 <span id="count-label">0</span> 款桌遊</div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title">新增桌遊</h2>
    <form id="game-form">
      <div class="field">
        <label>桌遊圖片（會自動壓縮）</label>
        <div class="img-upload" id="img-upload-box">
          <img id="img-preview" style="display:none;" />
          <div class="hint" id="img-hint">點擊或拖曳圖片到此處上傳</div>
          <input type="file" id="img-input" accept="image/*" />
        </div>
        <button type="button" class="btn-remove-image" id="img-remove-btn" style="display:none;">移除圖片</button>
      </div>
      <div class="field">
        <label>名稱（不限語言，中文、英文、日文等皆可作為主要名稱）</label>
        <input type="text" id="f-name" required placeholder="例如：卡卡頌、Carcassonne、カタン">
      </div>
      <div class="field">
        <label>別名／其他語言名稱（選填）</label>
        <input type="text" id="f-name-en" placeholder="例如：Carcassonne、カタン、カルカソンヌ">
      </div>
      <div class="field">
        <label>類型（以逗號分隔）</label>
        <input type="text" id="f-genre" placeholder="策略, 派對, 合作">
      </div>
      <div class="field">
        <label>語言版本（以逗號分隔）</label>
        <input type="text" id="f-lang" placeholder="繁體中文, English, 日本語">
      </div>
      <div class="field">
        <label>遊戲類型</label>
        <div class="radio-group">
          <label class="radio-pill"><input type="radio" name="f-type" id="f-type-base" value="base" checked> 主遊戲</label>
          <label class="radio-pill"><input type="radio" name="f-type" id="f-type-expansion" value="expansion"> 擴充</label>
        </div>
      </div>
      <div class="field" id="base-game-field" style="display:none;">
        <label>此擴充所屬的主遊戲（選填）</label>
        <input type="text" id="f-basegame" list="base-game-list" placeholder="例如：卡卡頌">
        <datalist id="base-game-list"></datalist>
      </div>
      <div class="field">
        <label>系列（選填，例如：卡卡頌系列）</label>
        <input type="text" id="f-series" placeholder="若不屬於特定系列可留空">
      </div>
      <div class="field">
        <label>網址連結（選填，例如 BGG 頁面或購買連結）</label>
        <input type="text" id="f-url" placeholder="https://...">
      </div>
      <div class="field">
        <label>發行年份（選填）</label>
        <input type="number" id="f-year" placeholder="例如：2000">
      </div>
      <div class="field">
        <label>難度（選填，1 星最簡單、5 星最難）</label>
        <div class="star-input" id="difficulty-input">
          <button type="button" class="star-btn" data-value="1">★</button>
          <button type="button" class="star-btn" data-value="2">★</button>
          <button type="button" class="star-btn" data-value="3">★</button>
          <button type="button" class="star-btn" data-value="4">★</button>
          <button type="button" class="star-btn" data-value="5">★</button>
          <button type="button" class="star-clear" id="difficulty-clear">清除</button>
        </div>
        <input type="hidden" id="f-difficulty" value="0">
      </div>
      <div class="field">
        <label>簡介</label>
        <textarea id="f-desc" placeholder="簡短描述遊戲玩法與特色"></textarea>
      </div>
      <div class="row2">
        <div class="field">
          <label>遊玩人數</label>
          <div class="num-group">
            <input type="number" id="f-minp" min="1" placeholder="最少" required>
            <span>–</span>
            <input type="number" id="f-maxp" min="1" placeholder="最多" required>
          </div>
        </div>
        <div class="field">
          <label>遊玩時間（分鐘）</label>
          <div class="num-group">
            <input type="number" id="f-mint" min="1" placeholder="最少" required>
            <span>–</span>
            <input type="number" id="f-maxt" min="1" placeholder="最多" required>
          </div>
        </div>
      </div>
      <input type="hidden" id="f-id">
      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="cancel-btn">取消</button>
        <button type="submit" class="btn-primary" id="save-btn">儲存</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="detail-overlay">
  <div class="modal detail-modal">
    <button class="detail-close" id="detail-close">✕</button>
    <div class="detail-img" id="detail-img"></div>
    <div class="detail-body">
      <div class="detail-name" id="detail-name"></div>
      <div class="detail-name-en" id="detail-name-en"></div>
      <div class="difficulty-stars" id="detail-difficulty"></div>
      <div class="detail-meta" id="detail-meta"></div>
      <div class="stats-row" id="detail-stats"></div>
      <div class="detail-desc" id="detail-desc"></div>
      <a href="#" target="_blank" rel="noopener" class="detail-link" id="detail-link" style="display:none;">前往連結 →</a>
    </div>
  </div>
</div>

<div class="overlay" id="image-manager-overlay">
  <div class="modal image-manager-modal">
    <button class="detail-close" id="image-manager-close">✕</button>
    <h2>批次圖片管理</h2>
    <p class="image-manager-hint">點「上傳」可更換圖片（會自動壓縮），點「移除」可清除該桌遊的圖片。</p>
    <div class="image-manager-list" id="image-manager-list"></div>
  </div>
</div>

<script type="module" src="app.js?v=12"></script>
</body>
</html>
